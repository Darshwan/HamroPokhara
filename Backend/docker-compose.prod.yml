services:
  db:
    image: postgres:16-alpine
    container_name: pratibimba-db-prod
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pratibimba-backend-prod
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      PORT: 8080
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_TRANSCRIBE_MODEL: ${OPENAI_TRANSCRIBE_MODEL:-whisper-1}
      ENV: production
      APP_NAME: ${APP_NAME:-PRATIBIMBA}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      FONT_DIR: /app/assets/fonts
      GENERATED_PDF_DIR: /app/generated_pdfs
    volumes:
      - generated_pdfs_prod:/app/generated_pdfs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: pratibimba-proxy-prod
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  pgdata_prod:
  generated_pdfs_prod:
